{% extends "base.html" %}
{% block title %}Server error — RetinaAI{% endblock %}

{% block content %}
<section class="section-error">
    <div class="container text-center">
        <svg viewBox="0 0 200 200" class="aperture-error" aria-hidden="true">
            <circle cx="100" cy="100" r="90" class="aperture-ring-outer"></circle>
            <circle cx="100" cy="100" r="60" class="aperture-ring-mid aperture-blur"></circle>
            <circle cx="100" cy="100" r="30" class="aperture-ring-core aperture-blur"></circle>
        </svg>
        <span class="eyebrow">500</span>
        <h1 class="section-title">Something went wrong on our end</h1>
        <p class="section-sub">The server hit an unexpected error while processing your request. Please try again in a moment.</p>
        <a href="{{ url_for('main.index') }}" class="btn btn-clinical-primary">Back to home</a>
    </div>
</section>
{% endblock %}
